# ==================== CONFIGURACI N ESPEC FICA DE PRUEBAS (Perfil 'test') ====================
# --- Base de Datos H2 en Memoria (Rapidez y Aislamiento) ---
# Usa una base de datos en memoria (H2) que se crea y destruye r pidamente.
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Deshabilita la consola H2 en tests (generalmente no es necesaria).
spring.h2.console.enabled=false
# --- JPA/Hibernate (Configuraci n de Pruebas) ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# CREATE-DROP: Crea el esquema al iniciar las pruebas y lo elimina al finalizar.
# Esto asegura que cada prueba tenga una base de datos limpia.
spring.jpa.hibernate.ddl-auto=create-drop
# Por defecto, se deshabilita el SQL en consola para que los logs de pruebas sean legibles.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# --- Logging (Debugging de Pruebas) ---
# DEBUG: Nivel detallado para tu propio c digo,  til para saber qu  se est  ejecutando en las pruebas.
logging.level.com.unlu.alimtrack=DEBUG
# WARN: Silencia el ruido del framework y Hibernate para concentrarse en los logs de la prueba.
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN